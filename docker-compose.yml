services:
  app:
    build: .
    ports:
      - "8080:8080"
    command: [ "-storage=postgres", "-dsn=postgres://postgres:devpass@db:5432/shortener" ]
    depends_on:
      db:
        condition: service_healthy

  db:
    image: postgres:17-alpine
    environment:
      POSTGRES_PASSWORD: devpass
      POSTGRES_DB: shortener
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres" ]
      interval: 2s
      timeout: 2s
      retries: 10
